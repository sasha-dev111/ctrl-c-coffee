<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Кошик | Ctrl+C Coffee</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .cart-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .cart-table {
            width: 100%;
            border-collapse: collapse;
            background: #161b22;
            border-radius: 12px;
            overflow: hidden;
        }
        .cart-table th, .cart-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #30363d;
        }
        .cart-table th {
            background: #0d1117;
            color: #58a6ff;
        }
        .cart-total {
            text-align: right;
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #7ee787;
        }
        .empty-cart {
            text-align: center;
            padding: 50px;
            color: #8b949e;
        }
        .quantity-btn {
            background: #238636;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            margin: 0 5px;
        }
        .remove-btn {
            background: #da3633;
        }
        .checkout-btn {
            background: #238636;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #58a6ff;
            text-decoration: none;
        }
        .warning {
            background: #da3633;
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <img src="assets/img/logo.png" alt="Logo" width="300">
            <nav>
                <ul>
                    <li><a href="index.html">Головна</a></li>
                    <li><a href="index.html#desserts">Десерти</a></li>
                    <li><a href="about.html">Про нас</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="cart-container">
        <h1 style="color: #7ee787;">🛒 Ваш кошик</h1>
        <div id="cart-content">
            
        </div>
    </main>

    <footer>
        <p>© 2026 Ctrl+C Coffee</p>
    </footer>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        function updateQuantity(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
                saveCart();
            }
        }

        function removeItem(id) {
            cart = cart.filter(i => i.id !== id);
            saveCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-content');
            
            if (cart.length === 0) {
                container.innerHTML = '<div class="empty-cart">Кошик порожній. Додайте щось смачненьке!</div>';
                return;
            }

            let total = 0;
            let html = '<table class="cart-table">';
            html += '<tr><th>Товар</th><th>Ціна</th><th>Кількість</th><th>Сума</th><th></th></tr>';
            
            cart.forEach(item => {
                const sum = item.price * item.quantity;
                total += sum;
                html += `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.price} ₴</td>
                        <td>
                            <button class="quantity-btn" data-id="${item.id}" data-delta="-1">-</button>
                            ${item.quantity}
                            <button class="quantity-btn" data-id="${item.id}" data-delta="1">+</button>
                        </td>
                        <td>${sum} ₴</td>
                        <td><button class="quantity-btn remove-btn" data-id="${item.id}" data-remove="true">Видалити</button></td>
                    </tr>
                `;
            });
            
            html += '</table>';
            html += `<div class="cart-total">Загальна сума: ${total} ₴</div>`;
            html += `<button class="checkout-btn" id="checkout-btn">Оформити замовлення</button><br>`;
            html += `<a href="index.html" class="back-link">← Продовжити покупки</a>`;
            
            container.innerHTML = html;
            
            document.querySelectorAll('.quantity-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = btn.dataset.id;
                    if (btn.dataset.remove === 'true') {
                        removeItem(id);
                    } else {
                        const delta = parseInt(btn.dataset.delta);
                        updateQuantity(id, delta);
                    }
                });
            });
            
            const checkoutBtn = document.getElementById('checkout-btn');
            if (checkoutBtn) {
                checkoutBtn.addEventListener('click', () => {
                    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
                    
                    if (!currentUser) {
                        alert('❌ Будь ласка, спочатку зареєструйтесь на головній сторінці (кнопка "Реєстрація" в шапці)');
                        return;
                    }
                    
                    alert(`🎉 Дякуємо за замовлення, ${currentUser.name}!\nНа суму ${total} ₴\nНайближчим часом зателефонуємо на номер ${currentUser.phone}`);
                    cart = [];
                    saveCart();
                });
            }
        }

        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
